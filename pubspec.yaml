name: mi_app
description: "MiActividad 2026 - App de campo para CAFÉ (offline-first)"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  intl: ^0.19.0

  # ── BASE DE DATOS LOCAL (offline-first) ──────────────────────────────────────
  sqflite: ^2.3.2
  sqflite_common_ffi: ^2.3.2   # necesario para Windows/Linux/macOS/Web
  path: ^1.9.0
  path_provider: ^2.1.4

  # ── FIREBASE (sync remoto cuando hay internet) ───────────────────────────────
  # INSTRUCCIONES:
  #   1. Crea proyecto en https://console.firebase.google.com
  #   2. Agrega app Android (com.ejemplo.mi_app) y/o iOS
  #   3. Descarga google-services.json → pon en android/app/
  #   4. Descarga GoogleService-Info.plist → pon en ios/Runner/
  #   5. Ejecuta: dart pub global activate flutterfire_cli
  #   6. Ejecuta: flutterfire configure
  #   7. Descomenta las líneas Firebase en lib/main.dart
  firebase_core: ^3.6.0
  cloud_firestore: ^5.4.0
  firebase_storage: ^12.3.0
  firebase_auth: ^5.3.0

  # ── CONECTIVIDAD ─────────────────────────────────────────────────────────────
  connectivity_plus: ^6.0.3

  # ── CÁMARA / FOTOS ───────────────────────────────────────────────────────────
  image_picker: ^1.1.2

  # ── GPS ──────────────────────────────────────────────────────────────────────
  geolocator: ^13.0.2

  # ── PERMISOS ─────────────────────────────────────────────────────────────────
  permission_handler: ^11.3.1

  # ── UUID ─────────────────────────────────────────────────────────────────────
  uuid: ^4.4.2

  # ── STATE MANAGEMENT ─────────────────────────────────────────────────────────
  provider: ^6.1.2

  # ── FIRMA DIGITAL ────────────────────────────────────────────────────────────
  syncfusion_flutter_signaturepad: ^27.1.48

  # ── GENERACIÓN PDF ───────────────────────────────────────────────────────────
  pdf: ^3.11.1
  printing: ^5.13.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  # assets:
  #   - assets/images/
  #   - assets/logo.png
